<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#0a233b"/>
  
  <!-- Rose petals -->
  <!-- Center -->
  <circle cx="256" cy="256" r="40" fill="#e8365d"/>
  
  <!-- Inner petals -->
  <ellipse cx="256" cy="196" rx="28" ry="45" fill="#f05a7e" opacity="0.9"/>
  <ellipse cx="256" cy="316" rx="28" ry="45" fill="#f05a7e" opacity="0.9" transform="rotate(180 256 256)"/>
  <ellipse cx="196" cy="256" rx="45" ry="28" fill="#f05a7e" opacity="0.9" transform="rotate(90 256 256)"/>
  <ellipse cx="316" cy="256" rx="45" ry="28" fill="#f05a7e" opacity="0.9" transform="rotate(270 256 256)"/>
  
  <!-- Diagonal inner petals -->
  <ellipse cx="256" cy="196" rx="22" ry="42" fill="#e8365d" opacity="0.85" transform="rotate(45 256 256)"/>
  <ellipse cx="256" cy="196" rx="22" ry="42" fill="#e8365d" opacity="0.85" transform="rotate(135 256 256)"/>
  <ellipse cx="256" cy="196" rx="22" ry="42" fill="#e8365d" opacity="0.85" transform="rotate(225 256 256)"/>
  <ellipse cx="256" cy="196" rx="22" ry="42" fill="#e8365d" opacity="0.85" transform="rotate(315 256 256)"/>
  
  <!-- Outer petals -->
  <ellipse cx="256" cy="155" rx="22" ry="55" fill="#c0254a" opacity="0.75"/>
  <ellipse cx="256" cy="155" rx="22" ry="55" fill="#c0254a" opacity="0.75" transform="rotate(60 256 256)"/>
  <ellipse cx="256" cy="155" rx="22" ry="55" fill="#c0254a" opacity="0.75" transform="rotate(120 256 256)"/>
  <ellipse cx="256" cy="155" rx="22" ry="55" fill="#c0254a" opacity="0.75" transform="rotate(180 256 256)"/>
  <ellipse cx="256" cy="155" rx="22" ry="55" fill="#c0254a" opacity="0.75" transform="rotate(240 256 256)"/>
  <ellipse cx="256" cy="155" rx="22" ry="55" fill="#c0254a" opacity="0.75" transform="rotate(300 256 256)"/>
  
  <!-- Center highlight -->
  <circle cx="256" cy="256" r="28" fill="#ff6b8a"/>
  <circle cx="248" cy="248" r="10" fill="#ffaabb" opacity="0.6"/>
  
  <!-- Stem -->
  <rect x="248" y="340" width="16" height="80" rx="8" fill="#2d7a3a"/>
  
  <!-- Leaf -->
  <ellipse cx="230" cy="390" rx="30" ry="12" fill="#3a9a4a" transform="rotate(-30 230 390)"/>
  <ellipse cx="282" cy="400" rx="28" ry="11" fill="#3a9a4a" transform="rotate(25 282 400)"/>
  
  <!-- "r" letter overlay -->
  <text x="256" y="272" font-family="Georgia, serif" font-size="48" font-weight="bold" 
        fill="white" text-anchor="middle" opacity="0.15">r</text>
</svg>
