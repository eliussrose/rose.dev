<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rose.dev AI IDE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        .status {
            background: rgba(255,255,255,0.1);
            padding: 1rem 2rem;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            margin-top: 2rem;
        }
        .btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 1rem 2rem;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            margin: 0.5rem;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌹 rose.dev AI IDE</h1>
        <p>Next-Generation AI-Powered Development Environment</p>
        
        <div class="status">
            <p id="status">Initializing...</p>
        </div>

        <div style="margin-top: 2rem;">
            <button class="btn" onclick="openDevMode()">Open Development Mode</button>
            <button class="btn" onclick="checkVersion()">Check Version</button>
        </div>
    </div>

    <script>
        // Update status
        document.getElementById('status').textContent = 'Ready! Tauri v2 + Next.js 16';

        function openDevMode() {
            alert('Development mode will open at http://localhost:3000\n\nRun: npm run dev');
        }

        function checkVersion() {
            alert('rose.dev AI IDE v2.0.46\nTauri v2 + Next.js 16 + React 19');
        }

        // Check if Tauri API is available
        if (window.__TAURI__) {
            console.log('Tauri API is available!');
            document.getElementById('status').textContent = 'Tauri Desktop App Ready!';
        }
    </script>
</body>
</html>
